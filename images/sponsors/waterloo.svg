  </g>
  <text x="60" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" fill="currentColor" letter-spacing="-0.01em">UNIVERSITY OF</text>
  <text x="60" y="46" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="900" fill="currentColor" letter-spacing="0.05em">WATERLOO</text>
</svg>
