<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="100%" height="100%">
  <!-- Waterloo Shield -->
  <g transform="translate(15, 10)">
    <!-- Shield shape -->
    <path d="M0,0 L30,0 C30,18 25,32 15,40 C5,32 0,18 0,0 Z" fill="#FFD200" />
    <path d="M3,3 L27,3 C27,17 22,29 15,36 C8,29 3,17 3,3 Z" fill="#000000" />
    <!-- Chevron -->
    <path d="M5,22 L15,10 L25,22 L25,26 L15,14 L5,26 Z" fill="#FFD200" />
